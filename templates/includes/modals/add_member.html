<!-- Add Member Modal -->
<div x-show="addModalOpen" 
     class="fixed inset-0 z-[100] flex items-center justify-center p-4"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 scale-95"
     x-transition:enter-end="opacity-100 scale-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 scale-100"
     x-transition:leave-end="opacity-0 scale-95">
    
    <!-- Backdrop -->
    <div @click="addModalOpen = false" class="absolute inset-0 bg-zinc-950/80 backdrop-blur-md"></div>

    <!-- Modal Card -->
    <div class="bg-zinc-900 border border-zinc-800 w-full max-w-2xl rounded-[3rem] shadow-2xl relative z-10 overflow-hidden">
        <!-- Decoration -->
        <div class="absolute top-0 right-0 w-64 h-64 bg-yellow-400/5 rounded-full blur-[80px] -mr-32 -mt-32"></div>

        <div class="p-10">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-3xl font-bold tracking-tight text-white italic">Add New Member</h2>
                    <p class="text-zinc-500 text-sm mt-1">Register a new athlete to the GymForge roster.</p>
                </div>
                <button @click="addModalOpen = false" class="w-12 h-12 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center justify-center text-zinc-500 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <form class="space-y-6">
                <!-- Personal Info -->
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 ml-1">Full Name</label>
                        <div class="relative">
                            <input type="text" placeholder="Juan Dela Cruz" 
                                class="w-full bg-zinc-800 border-none rounded-2xl py-4 px-6 text-sm outline-none focus:ring-2 focus:ring-yellow-400/50 transition-all text-zinc-100">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 ml-1">Email Address</label>
                        <input type="email" placeholder="juan@example.com" 
                            class="w-full bg-zinc-800 border-none rounded-2xl py-4 px-6 text-sm outline-none focus:ring-2 focus:ring-yellow-400/50 transition-all text-zinc-100">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 ml-1">Phone Number</label>
                        <input type="tel" placeholder="+63 917 123 4567" 
                            class="w-full bg-zinc-800 border-none rounded-2xl py-4 px-6 text-sm outline-none focus:ring-2 focus:ring-yellow-400/50 transition-all text-zinc-100">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 ml-1">Membership Plan</label>
                        <select class="w-full bg-zinc-800 border-none rounded-2xl py-4 px-6 text-sm outline-none focus:ring-2 focus:ring-yellow-400/50 transition-all text-zinc-100 cursor-pointer">
                            <option value="">Select a plan...</option>
                            <option value="monthly">Basic Monthly (₱1,499)</option>
                            <option value="quarterly">Quarterly Pro (₱3,999)</option>
                            <option value="annual">Premium Annual (₱12,999)</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 ml-1">Emergency Contact & Relation</label>
                    <input type="text" placeholder="Pedro Santos (Husband) - +63 945..." 
                        class="w-full bg-zinc-800 border-none rounded-2xl py-4 px-6 text-sm outline-none focus:ring-2 focus:ring-yellow-400/50 transition-all text-zinc-100">
                </div>

                <!-- Footer Actions -->
                <div class="flex items-center justify-end gap-3 mt-10 pt-8 border-t border-zinc-800">
                    <button type="button" @click="addModalOpen = false" class="px-8 py-4 text-sm font-bold text-zinc-500 hover:text-zinc-300 transition-colors uppercase tracking-widest">
                        Cancel
                    </button>
                    <button type="submit" class="bg-yellow-400 hover:bg-yellow-300 text-zinc-950 px-10 py-4 rounded-2xl text-sm font-black transition-all shadow-xl shadow-yellow-400/10 active:scale-95 uppercase tracking-widest">
                        Create Member Profile
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
