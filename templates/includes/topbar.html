<header class="h-24 flex-none bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between relative z-50 shadow-md">
    <!-- Branding Section -->
    <div class="flex items-center gap-4 lg:gap-6">
        <!-- Mobile Toggle -->
        <label for="main-drawer" class="btn btn-ghost btn-square lg:hidden text-zinc-400">
            <i class="fa-solid fa-bars text-xl"></i>
        </label>

        <div class="flex items-center gap-4">
            <!-- Logo Placeholder -->
            <div class="w-12 h-12 bg-yellow-400 rounded-2xl flex items-center justify-center text-zinc-950 font-bold text-3xl logo-font">G</div>
            <div class="flex flex-col">
                <span class="text-xl lg:text-2xl font-bold tracking-tighter logo-font text-zinc-100">GymForge</span>
                <span class="hidden md:inline text-xs text-zinc-500 font-medium uppercase tracking-widest">Gym Management System - GMS</span>
            </div>
        </div>
    </div>

    <!-- Search Section -->
    <div class="flex-1 hidden md:flex justify-center px-4 lg:px-12">
        <div class="relative w-full max-w-xl">
            <input type="text" id="searchInput"
                placeholder="Search members or classes..."
                class="input input-bordered w-full bg-zinc-800 border-zinc-700 focus:border-yellow-400 rounded-3xl py-3 px-6 text-sm outline-none transition-all">
            <i class="fa-solid fa-magnifying-glass absolute right-6 top-1/2 -translate-y-1/2 text-zinc-500"></i>
        </div>
    </div>

    <!-- Actions & Profile Section -->
    <div class="flex items-center gap-4 lg:gap-8">
        <!-- Notifications -->
        <div class="indicator cursor-pointer group">
            <span class="indicator-item badge badge-error badge-sm ring-2 ring-zinc-900">3</span>
            <i class="fa-solid fa-bell text-xl text-zinc-400 group-hover:text-yellow-400 transition-colors"></i>
        </div>

        <!-- Add Member Button -->
        <a href="{% url 'member_create' %}" 
           class="hidden xl:flex btn btn-warning btn-sm items-center gap-2 rounded-2xl font-black text-sm transition-all shadow-lg shadow-yellow-400/10 active:scale-95">
            <i class="fa-solid fa-plus"></i>
            <span>Add Member</span>
        </a>

        <!-- Profile -->
        <div class="flex items-center gap-4 border-l border-zinc-800 pl-4 lg:pl-8">
            <div class="text-right hidden sm:block">
                <div class="text-sm font-bold text-zinc-100 italic">Owner</div>
                <div class="text-[10px] text-emerald-400 flex items-center gap-1 justify-end uppercase font-black">
                    <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                    Online
                </div>
            </div>
            <div class="avatar">
                <div class="w-10 lg:w-11 rounded-2xl border border-zinc-700 p-0.5">
                    <img src="https://picsum.photos/id/64/128/128" alt="Admin" />
                </div>
            </div>
        </div>
    </div>
</header>
