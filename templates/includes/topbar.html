<header class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
    <div class="flex items-center gap-6 flex-1">
        <div class="relative w-80">
            <input type="text" id="searchInput"
                placeholder="Search members or classes..."
                class="w-full bg-zinc-800 border border-zinc-700 focus:border-yellow-400 rounded-3xl py-3 px-5 text-sm outline-none">
            <i class="fa-solid fa-magnifying-glass absolute right-5 top-1/2 -translate-y-1/2 text-zinc-500"></i>
        </div>
    </div>

    <div class="flex items-center gap-6">
        <!-- Notifications -->
        <div class="relative cursor-pointer">
            <i class="fa-solid fa-bell text-xl"></i>
            <span class="absolute -top-1 -right-1 bg-red-500 text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">3</span>
        </div>

        <!-- Quick add -->
        <button @click="addModalOpen = true"
            class="bg-yellow-400 hover:bg-yellow-300 transition-colors text-zinc-950 font-semibold px-6 py-2.5 rounded-3xl flex items-center gap-2 text-sm">
            <i class="fa-solid fa-plus"></i>
            <span>Add Member</span>
        </button>

        <!-- Profile -->
        <div class="flex items-center gap-3">
            <div class="text-right">
                <div class="text-sm font-medium">Admin</div>
                <div class="text-xs text-emerald-400">Online</div>
            </div>
            <div class="w-9 h-9 bg-zinc-700 rounded-2xl overflow-hidden">
                <img src="https://picsum.photos/id/64/128/128" alt="Admin"
                    class="w-full h-full object-cover">
            </div>
        </div>
    </div>
</header>
