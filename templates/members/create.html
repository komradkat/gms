{% extends 'base.html' %}
{% load static %}

{% block title %}Add New Member • GymForge GMS{% endblock %}

{% block content %}
<!-- Breadcrumbs & Header -->
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div class="flex items-center gap-4">
        <a href="{% url 'member_list' %}" class="btn btn-square btn-zinc-900 border-zinc-800 btn-sm rounded-xl hover:text-yellow-500 transition-colors">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div>
            <div class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-600 mb-1">Onboarding</div>
            <h1 class="text-3xl font-bold tracking-tight text-white">Register New Member</h1>
        </div>
    </div>
    <div class="flex items-center gap-2">
        <a href="{% url 'member_list' %}" class="btn btn-zinc-800 btn-sm text-zinc-500 border-zinc-700/50 rounded-xl px-6 font-bold uppercase text-[10px]">Discard</a>
        <button type="submit" form="member-form" class="btn btn-yellow-500 btn-sm text-zinc-950 font-black rounded-xl px-8 active:scale-95 uppercase text-[10px]">
            Execute Registration
        </button>
    </div>
</div>

<!-- Main Form Grid -->
<form id="member-form" action="{% url 'member_list' %}" class="grid grid-cols-1 xl:grid-cols-3 gap-6">
    <!-- Left & Center: Multi-section Form -->
    <div class="xl:col-span-2 space-y-6">
        <!-- Section 1: Personal Profile -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-xl">
            <div class="flex items-center gap-3 pb-4 border-b border-zinc-800 mb-6">
                <div class="w-7 h-7 bg-yellow-500/10 rounded-lg flex items-center justify-center text-yellow-500">
                    <i class="fa-solid fa-user text-[10px]"></i>
                </div>
                <h3 class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Personal Information</h3>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="form-control w-full">
                    <label class="label pt-0">
                        <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Legal Full Name</span>
                    </label>
                    <input type="text" placeholder="e.g. Maria Clara Santos" required class="input input-sm bg-zinc-950 border-zinc-800 rounded-xl focus:border-yellow-500/50 text-zinc-200 text-xs">
                </div>
                <div class="form-control w-full">
                    <label class="label pt-0">
                        <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Primary Email</span>
                    </label>
                    <input type="email" placeholder="maria@example.com" required class="input input-sm bg-zinc-950 border-zinc-800 rounded-xl focus:border-yellow-500/50 text-zinc-200 text-xs">
                </div>
                <div class="form-control w-full">
                    <label class="label pt-0">
                        <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Contact Number</span>
                    </label>
                    <input type="tel" placeholder="+63 912 345 6789" required class="input input-sm bg-zinc-950 border-zinc-800 rounded-xl focus:border-yellow-500/50 text-zinc-200 text-xs">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-control w-full">
                        <label class="label pt-0">
                            <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Sex</span>
                        </label>
                        <select class="select select-sm bg-zinc-950 border-zinc-800 rounded-xl focus:border-yellow-500/50 text-zinc-400 text-xs font-bold">
                            <option>Select...</option>
                            <option>Female</option>
                            <option>Male</option>
                        </select>
                    </div>
                    <div class="form-control w-full">
                        <label class="label pt-0">
                            <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Birth Date</span>
                        </label>
                        <input type="date" class="input input-sm bg-zinc-950 border-zinc-800 rounded-xl focus:border-yellow-500/50 text-zinc-400 text-xs uppercase font-bold">
                    </div>
                </div>
            </div>
            <div class="form-control w-full mt-5">
                <label class="label pt-0">
                    <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Mailing Address</span>
                </label>
                <textarea rows="2" placeholder="Unit/Street, Barangay, City, Province" class="textarea textarea-sm bg-zinc-950 border-zinc-800 rounded-xl focus:border-yellow-500/50 text-zinc-200 text-xs resize-none"></textarea>
            </div>
        </div>

        <!-- Section 2: Health Profile -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
            <div class="flex items-center gap-3 pb-4 border-b border-zinc-800 mb-6">
                <div class="w-7 h-7 bg-emerald-500/10 rounded-lg flex items-center justify-center text-emerald-500">
                    <i class="fa-solid fa-heart-pulse text-[10px]"></i>
                </div>
                <h3 class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Health Profile</h3>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div class="form-control w-full">
                    <label class="label pt-0">
                        <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Primary Objective</span>
                    </label>
                    <select class="select select-sm bg-zinc-950 border-zinc-800 rounded-xl focus:border-yellow-500/50 text-zinc-400 text-xs font-bold">
                        <option>Weight Loss</option>
                        <option>Muscle Gain</option>
                        <option>Endurance</option>
                        <option>General Fitness</option>
                    </select>
                </div>
                <div class="form-control w-full">
                    <label class="label pt-0">
                        <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Weight (kg)</span>
                    </label>
                    <input type="number" placeholder="0.0" class="input input-sm bg-zinc-950 border-zinc-800 rounded-xl focus:border-yellow-500/50 text-zinc-200 text-xs">
                </div>
                <div class="form-control w-full">
                    <label class="label pt-0">
                        <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Height (cm)</span>
                    </label>
                    <input type="number" placeholder="0" class="input input-sm bg-zinc-950 border-zinc-800 rounded-xl focus:border-yellow-500/50 text-zinc-200 text-xs">
                </div>
            </div>
            <div class="form-control w-full mt-5">
                <label class="label pt-0">
                    <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Special Medical Notes</span>
                </label>
                <input type="text" placeholder="e.g. Asthma, Previous injuries (Optional)" class="input input-sm bg-zinc-950 border-zinc-800 rounded-xl focus:border-yellow-500/50 text-zinc-200 text-xs">
            </div>
        </div>
    </div>

    <!-- Right Sidebar -->
    <div class="space-y-6">
        <!-- Membership Plan -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
            <div class="flex items-center gap-3 pb-4 border-b border-zinc-800 mb-6">
                <div class="w-7 h-7 bg-yellow-500/10 rounded-lg flex items-center justify-center text-yellow-500">
                    <i class="fa-solid fa-gem text-[10px]"></i>
                </div>
                <h3 class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Plan Selection</h3>
            </div>

            <div class="space-y-2">
                <label class="flex items-center gap-3 p-3 rounded-xl bg-zinc-950 border border-zinc-800 hover:border-yellow-500/30 transition-all cursor-pointer group">
                    <input type="radio" name="plan" class="radio radio-xs radio-warning" checked>
                    <div class="flex-1">
                        <div class="text-[11px] font-black text-zinc-300 uppercase tracking-tighter group-hover:text-white transition-colors">Basic Monthly</div>
                        <div class="text-[9px] text-zinc-600 font-bold uppercase">₱1,499 / mo</div>
                    </div>
                </label>

                <label class="flex items-center gap-3 p-3 rounded-xl bg-zinc-950 border border-zinc-800 hover:border-yellow-500/30 transition-all cursor-pointer group">
                    <input type="radio" name="plan" class="radio radio-xs radio-warning">
                    <div class="flex-1">
                        <div class="text-[11px] font-black text-zinc-300 uppercase tracking-tighter group-hover:text-white transition-colors">Quarterly Pro</div>
                        <div class="text-[9px] text-zinc-600 font-bold uppercase">₱3,999 / 3 mos</div>
                    </div>
                </label>

                <label class="flex items-center gap-3 p-3 rounded-xl bg-zinc-950 border border-zinc-800 hover:border-yellow-500 transition-all cursor-pointer group">
                    <input type="radio" name="plan" class="radio radio-xs radio-warning">
                    <div class="flex-1">
                        <div class="text-[11px] font-black text-yellow-500 uppercase tracking-tighter">Premium Annual</div>
                        <div class="text-[9px] text-zinc-600 font-bold uppercase">Best Value • ₱12,999</div>
                    </div>
                </label>
            </div>

            <div class="form-control w-full mt-6">
                <label class="label pt-0">
                    <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Activation Date</span>
                </label>
                <input type="date" class="input input-sm bg-zinc-950 border-zinc-800 rounded-xl text-zinc-500 text-[10px] uppercase font-bold">
            </div>
        </div>

        <!-- Emergency Contact -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
            <div class="flex items-center gap-3 pb-4 border-b border-zinc-800 mb-6">
                <div class="w-7 h-7 bg-red-500/10 rounded-lg flex items-center justify-center text-red-500">
                    <i class="fa-solid fa-phone-flip text-[10px]"></i>
                </div>
                <h3 class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Emergency Case</h3>
            </div>

            <div class="space-y-4">
                <div class="form-control w-full">
                    <label class="label pt-0">
                        <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Full Name</span>
                    </label>
                    <input type="text" placeholder="Contact Name" class="input input-sm bg-zinc-950 border-zinc-800 rounded-xl text-zinc-200 text-xs">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="form-control w-full">
                        <label class="label pt-0">
                            <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Relation</span>
                        </label>
                        <input type="text" placeholder="e.g. Spouse" class="input input-sm bg-zinc-950 border-zinc-800 rounded-xl text-zinc-200 text-xs">
                    </div>
                    <div class="form-control w-full">
                        <label class="label pt-0">
                            <span class="label-text-alt font-black uppercase text-zinc-600 tracking-tighter">Phone</span>
                        </label>
                        <input type="tel" placeholder="Number" class="input input-sm bg-zinc-950 border-zinc-800 rounded-xl text-zinc-200 text-xs">
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>
{% endblock %}
