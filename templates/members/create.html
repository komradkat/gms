{% extends 'base.html' %}
{% load static %}

{% block title %}Add New Member • GymForge GMS{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Breadcrumbs & Header -->
    <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-4">
            <a href="{% url 'member_list' %}" class="btn btn-square btn-ghost bg-zinc-900 border-zinc-800 hover:text-yellow-400 transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <div class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-600 mb-1">Membership Management</div>
                <h1 class="text-3xl font-bold tracking-tight text-white italic">Register New Member</h1>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <a href="{% url 'member_list' %}" class="btn btn-ghost text-zinc-500 hover:text-zinc-300 uppercase tracking-widest text-xs font-bold">Discard</a>
            <button type="submit" form="member-form" class="btn btn-warning shadow-xl shadow-yellow-400/10 active:scale-95 uppercase tracking-widest font-black">
                Save & Register
            </button>
        </div>
    </div>

    <!-- Main Form Grid -->
    <form id="member-form" action="{% url 'member_list' %}" class="grid grid-cols-1 xl:grid-cols-3 gap-8">
        <!-- Left & Center: Multi-section Form -->
        <div class="xl:col-span-2 space-y-8">
            <!-- Section 1: Personal Profile -->
            <div class="card bg-zinc-900/50 border border-zinc-800 rounded-[2.5rem] p-8 shadow-xl">
                <div class="flex items-center gap-3 pb-6 border-b border-zinc-800 mb-6">
                    <div class="w-8 h-8 bg-yellow-400/10 rounded-lg flex items-center justify-center text-yellow-400">
                        <i class="fa-solid fa-user text-xs"></i>
                    </div>
                    <h3 class="text-sm font-black uppercase tracking-widest text-zinc-400">Personal Profile</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="form-control w-full">
                        <label class="label">
                            <span class="label-text-alt font-black uppercase text-zinc-600">Full Name</span>
                        </label>
                        <input type="text" placeholder="e.g. Maria Clara Santos" required class="input input-bordered w-full bg-zinc-800/80 border-zinc-700 focus:border-yellow-400 text-zinc-200">
                    </div>
                    <div class="form-control w-full">
                        <label class="label">
                            <span class="label-text-alt font-black uppercase text-zinc-600">Email Address</span>
                        </label>
                        <input type="email" placeholder="maria@example.com" required class="input input-bordered w-full bg-zinc-800/80 border-zinc-700 focus:border-yellow-400 text-zinc-200">
                    </div>
                    <div class="form-control w-full">
                        <label class="label">
                            <span class="label-text-alt font-black uppercase text-zinc-600">Phone Number</span>
                        </label>
                        <input type="tel" placeholder="+63 912 345 6789" required class="input input-bordered w-full bg-zinc-800/80 border-zinc-700 focus:border-yellow-400 text-zinc-200">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-control w-full">
                            <label class="label">
                                <span class="label-text-alt font-black uppercase text-zinc-600">Gender</span>
                            </label>
                            <select class="select select-bordered w-full bg-zinc-800/80 border-zinc-700 focus:border-yellow-400 text-zinc-200">
                                <option>Select...</option>
                                <option>Female</option>
                                <option>Male</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="form-control w-full">
                            <label class="label">
                                <span class="label-text-alt font-black uppercase text-zinc-600">Date of Birth</span>
                            </label>
                            <input type="date" class="input input-bordered w-full bg-zinc-800/80 border-zinc-700 focus:border-yellow-400 text-zinc-200">
                        </div>
                    </div>
                </div>
                <div class="form-control w-full mt-6">
                    <label class="label">
                        <span class="label-text-alt font-black uppercase text-zinc-600">Complete Address</span>
                    </label>
                    <textarea rows="2" placeholder="Unit/Street, Barangay, City, Province" class="textarea textarea-bordered w-full bg-zinc-800/80 border-zinc-700 focus:border-yellow-400 text-zinc-200 resize-none"></textarea>
                </div>
            </div>

            <!-- Section 2: Health & Fitness -->
            <div class="card bg-zinc-900/50 border border-zinc-800 rounded-[2.5rem] p-8 shadow-xl">
                <div class="flex items-center gap-3 pb-6 border-b border-zinc-800 mb-6">
                    <div class="w-8 h-8 bg-emerald-400/10 rounded-lg flex items-center justify-center text-emerald-400">
                        <i class="fa-solid fa-heart-pulse text-xs"></i>
                    </div>
                    <h3 class="text-sm font-black uppercase tracking-widest text-zinc-400">Health & Fitness Goals</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="form-control w-full">
                        <label class="label">
                            <span class="label-text-alt font-black uppercase text-zinc-600">Primary Goal</span>
                        </label>
                        <select class="select select-bordered w-full bg-zinc-800/80 border-zinc-700 focus:border-yellow-400 text-zinc-200">
                            <option>Weight Loss</option>
                            <option>Muscle Building</option>
                            <option>Endurance</option>
                            <option>Flexibility</option>
                            <option>General Health</option>
                        </select>
                    </div>
                    <div class="form-control w-full">
                        <label class="label">
                            <span class="label-text-alt font-black uppercase text-zinc-600">Weight (kg)</span>
                        </label>
                        <input type="number" placeholder="0.0" class="input input-bordered w-full bg-zinc-800/80 border-zinc-700 focus:border-yellow-400 text-zinc-200">
                    </div>
                    <div class="form-control w-full">
                        <label class="label">
                            <span class="label-text-alt font-black uppercase text-zinc-600">Height (cm)</span>
                        </label>
                        <input type="number" placeholder="0" class="input input-bordered w-full bg-zinc-800/80 border-zinc-700 focus:border-yellow-400 text-zinc-200">
                    </div>
                </div>
                <div class="form-control w-full mt-6">
                    <label class="label">
                        <span class="label-text-alt font-black uppercase text-zinc-600">Medical Conditions / Allergies</span>
                    </label>
                    <input type="text" placeholder="e.g. Asthma, Hypertension (Leave blank if none)" class="input input-bordered w-full bg-zinc-800/80 border-zinc-700 focus:border-yellow-400 text-zinc-200">
                </div>
            </div>
        </div>

        <!-- Right Sidebar: Plan & Emergency -->
        <div class="space-y-8">
            <!-- Section 3: Membership Selection -->
            <div class="card bg-zinc-900/50 border border-zinc-800 rounded-[2.5rem] p-8 shadow-xl">
                <div class="flex items-center gap-3 pb-6 border-b border-zinc-800 mb-6">
                    <div class="w-8 h-8 bg-yellow-400/10 rounded-lg flex items-center justify-center text-yellow-400">
                        <i class="fa-solid fa-gem text-xs"></i>
                    </div>
                    <h3 class="text-sm font-black uppercase tracking-widest text-zinc-400">Membership Plan</h3>
                </div>

                <div class="space-y-3">
                    <div class="form-control">
                        <label class="label cursor-pointer p-4 rounded-2xl bg-zinc-800/50 border border-zinc-700 hover:border-yellow-400/50 transition-all gap-4">
                            <input type="radio" name="plan" class="radio radio-warning" checked>
                            <div class="flex-1">
                                <div class="text-sm font-bold text-zinc-200">Basic Monthly</div>
                                <div class="text-[10px] text-emerald-400 font-bold">₱1,499 / mo</div>
                            </div>
                        </label>
                    </div>

                    <div class="form-control">
                        <label class="label cursor-pointer p-4 rounded-2xl bg-zinc-800/50 border border-zinc-700 hover:border-emerald-400/50 transition-all gap-4">
                            <input type="radio" name="plan" class="radio radio-success">
                            <div class="flex-1">
                                <div class="text-sm font-bold text-zinc-200">Quarterly Pro</div>
                                <div class="text-[10px] text-emerald-400 font-bold">₱3,999 / 3 mos</div>
                            </div>
                        </label>
                    </div>

                    <div class="form-control">
                        <label class="label cursor-pointer p-4 rounded-2xl bg-zinc-800/50 border border-zinc-700 hover:border-yellow-400 transition-all gap-4">
                            <input type="radio" name="plan" class="radio radio-warning">
                            <div class="flex-1">
                                <div class="text-sm font-bold text-zinc-200">Premium Annual</div>
                                <div class="text-[10px] text-yellow-400 font-bold uppercase tracking-tighter">Best Value • ₱12,999 / yr</div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-control w-full mt-8">
                    <label class="label">
                        <span class="label-text-alt font-black uppercase text-zinc-600">Start Date</span>
                    </label>
                    <input type="date" class="input input-bordered w-full bg-zinc-800/50 border-zinc-700 text-zinc-200">
                </div>
            </div>

            <!-- Section 4: Emergency Details -->
            <div class="card bg-zinc-900/50 border border-zinc-800 rounded-[2.5rem] p-8 shadow-xl">
                <div class="flex items-center gap-3 pb-6 border-b border-zinc-800 mb-6">
                    <div class="w-8 h-8 bg-red-400/10 rounded-lg flex items-center justify-center text-red-400">
                        <i class="fa-solid fa-heart text-xs"></i>
                    </div>
                    <h3 class="text-sm font-black uppercase tracking-widest text-zinc-400">Emergency Case</h3>
                </div>

                <div class="space-y-4">
                    <div class="form-control w-full">
                        <label class="label">
                            <span class="label-text-alt font-black uppercase text-zinc-600">Contact Person</span>
                        </label>
                        <input type="text" placeholder="Full Name" class="input input-bordered w-full bg-zinc-800/50 border-zinc-700 text-zinc-200">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-control w-full">
                            <label class="label">
                                <span class="label-text-alt font-black uppercase text-zinc-600">Relation</span>
                            </label>
                            <input type="text" placeholder="e.g. Spouse" class="input input-bordered w-full bg-zinc-800/50 border-zinc-700 text-zinc-200">
                        </div>
                        <div class="form-control w-full">
                            <label class="label">
                                <span class="label-text-alt font-black uppercase text-zinc-600">Phone</span>
                            </label>
                            <input type="tel" placeholder="Phone" class="input input-bordered w-full bg-zinc-800/50 border-zinc-700 text-zinc-200">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
{% endblock %}
