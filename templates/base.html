{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GymForge • Advanced Dashboard{% endblock %}</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js CDN -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');

        :root {
            --primary: 234 179 8;
        }

        .tail-container {
            font-family: 'Inter', system_ui, sans-serif;
        }

        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }

        .stat-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .sidebar-link {
            transition: all 0.2s;
        }

        .sidebar-link:hover {
            background-color: rgb(234 179 8 / 0.1);
            color: rgb(234 179 8);
        }

        .active-link {
            background-color: rgb(234 179 8 / 0.1);
            color: rgb(234 179 8);
            border-left: 4px solid rgb(234 179 8);
        }

        canvas {
            max-height: 320px;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body class="tail-container bg-zinc-950 text-zinc-200 h-full overflow-hidden" x-data="{ sidebarOpen: true, addModalOpen: false }">
    <div class="flex flex-col h-screen overflow-hidden">
        <!-- TOP BAR -->
        {% include 'includes/topbar.html' %}

        <!-- MAIN BODY (Sidebar + Content) -->
        <div class="flex flex-1 overflow-hidden">
            <!-- SIDEBAR -->
            {% include 'includes/sidebar.html' %}

            <!-- CONTENT BODY -->
            <main class="flex-1 overflow-auto p-8 bg-zinc-950">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- MODALS -->
    {% block modals %}{% endblock %}

    {% block extra_js %}{% endblock %}
</body>

</html>
