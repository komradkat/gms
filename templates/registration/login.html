{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • GymForge GMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .glass {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(63, 63, 70, 0.5);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 h-full flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-yellow-400/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-400/5 rounded-full blur-[120px]"></div>

    <div class="w-full max-w-md relative z-10">
        <!-- Brand -->
        <div class="flex flex-col items-center mb-10">
            <div class="w-16 h-16 bg-yellow-400 rounded-2xl flex items-center justify-center text-zinc-950 font-bold text-4xl logo-font mb-4 shadow-xl shadow-yellow-400/20">G</div>
            <h1 class="text-3xl font-bold tracking-tighter logo-font text-zinc-100">GymForge</h1>
            <p class="text-zinc-500 text-sm uppercase tracking-widest mt-1">Gym Management System</p>
        </div>

        <!-- Login Card -->
        <div class="glass rounded-[2rem] p-10 shadow-2xl">
            <h2 class="text-2xl font-bold mb-8 text-zinc-100 italic">Welcome back</h2>
            
            <form action="{% url 'dashboard' %}" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">Username or Email</label>
                    <div class="relative">
                        <input type="text" placeholder="admin@gymforge.com" 
                            class="w-full bg-zinc-900/50 border border-zinc-700 focus:border-yellow-400 rounded-2xl py-4 px-6 text-sm outline-none transition-all pl-12">
                        <i class="fa-solid fa-user absolute left-5 top-1/2 -translate-y-1/2 text-zinc-600 text-xs"></i>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 ml-1">Password</label>
                        <a href="#" class="text-xs text-yellow-400/80 hover:text-yellow-400 transition-colors uppercase font-bold tracking-tighter">Forgot?</a>
                    </div>
                    <div class="relative">
                        <input type="password" placeholder="••••••••" 
                            class="w-full bg-zinc-900/50 border border-zinc-700 focus:border-yellow-400 rounded-2xl py-4 px-6 text-sm outline-none transition-all pl-12">
                        <i class="fa-solid fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-zinc-600 text-xs"></i>
                    </div>
                </div>

                <div class="flex items-center gap-2 px-1">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded border-zinc-700 bg-zinc-900 accent-yellow-400 cursor-pointer">
                    <label for="remember" class="text-sm text-zinc-500 cursor-pointer select-none">Remember for 30 days</label>
                </div>

                <button type="submit" 
                    class="w-full bg-yellow-400 hover:bg-yellow-300 transition-all text-zinc-950 font-black py-4 rounded-2xl flex items-center justify-center gap-2 text-sm shadow-xl shadow-yellow-400/10 active:scale-[0.98] mt-4 uppercase tracking-widest">
                    <span>Sign In</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-zinc-800 text-center">
                <p class="text-zinc-500 text-sm">
                    New to the forge? 
                    <a href="{% url 'register' %}" class="text-yellow-400 font-bold hover:underline underline-offset-4 ml-1">Create an account</a>
                </p>
            </div>
        </div>
        
        <p class="text-center mt-8 text-zinc-600 text-[10px] uppercase tracking-[0.2em] font-medium">
            &copy; 2026 GymForge Infrastructure • All Rights Reserved
        </p>
    </div>
</body>
</html>
