{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Forge • GymForge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .glass {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(63, 63, 70, 0.5);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 h-full flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-400/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-yellow-400/5 rounded-full blur-[120px]"></div>

    <div class="w-full max-w-xl relative z-10">
        <!-- Brand -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-14 h-14 bg-yellow-400 rounded-2xl flex items-center justify-center text-zinc-950 font-bold text-3xl logo-font mb-4 shadow-xl shadow-yellow-400/20">G</div>
            <h1 class="text-2xl font-bold tracking-tighter logo-font text-zinc-100">GymForge Membership</h1>
        </div>

        <!-- Register Card -->
        <div class="glass rounded-[2rem] p-10 shadow-2xl">
            <h2 class="text-2xl font-bold mb-8 text-zinc-100 italic">Start your journey</h2>
            
            <form action="{% url 'login' %}" class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">Full Name</label>
                        <input type="text" placeholder="Juan Dela Cruz" 
                            class="w-full bg-zinc-900/50 border border-zinc-700 focus:border-yellow-400 rounded-2xl py-4 px-6 text-sm outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">Email Address</label>
                        <input type="email" placeholder="juan@example.com" 
                            class="w-full bg-zinc-900/50 border border-zinc-700 focus:border-yellow-400 rounded-2xl py-4 px-6 text-sm outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">Select Plan</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="relative group cursor-pointer">
                            <input type="radio" name="plan" class="peer hidden" checked>
                            <div class="p-4 rounded-2xl bg-zinc-900/50 border border-zinc-700 peer-checked:border-yellow-400 peer-checked:bg-yellow-400/5 transition-all text-center">
                                <span class="block text-[10px] font-black uppercase text-zinc-500 peer-checked:text-yellow-400">Monthly</span>
                                <span class="block text-lg font-bold">₱1,499</span>
                            </div>
                        </label>
                        <label class="relative group cursor-pointer">
                            <input type="radio" name="plan" class="peer hidden">
                            <div class="p-4 rounded-2xl bg-zinc-900/50 border border-zinc-700 peer-checked:border-yellow-400 peer-checked:bg-yellow-400/5 transition-all text-center">
                                <span class="block text-[10px] font-black uppercase text-zinc-500 peer-checked:text-emerald-400">Quarterly</span>
                                <span class="block text-lg font-bold">₱3,999</span>
                            </div>
                        </label>
                        <label class="relative group cursor-pointer">
                            <input type="radio" name="plan" class="peer hidden">
                            <div class="p-4 rounded-2xl bg-zinc-900/50 border border-zinc-700 peer-checked:border-yellow-400 peer-checked:bg-yellow-400/5 transition-all text-center">
                                <span class="block text-[10px] font-black uppercase text-zinc-500 peer-checked:text-yellow-400">Annual</span>
                                <span class="block text-lg font-bold">₱12,999</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">Password</label>
                        <input type="password" placeholder="••••••••" 
                            class="w-full bg-zinc-900/50 border border-zinc-700 focus:border-yellow-400 rounded-2xl py-4 px-6 text-sm outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">Confirm</label>
                        <input type="password" placeholder="••••••••" 
                            class="w-full bg-zinc-900/50 border border-zinc-700 focus:border-yellow-400 rounded-2xl py-4 px-6 text-sm outline-none transition-all">
                    </div>
                </div>

                <div class="flex items-start gap-3 px-1 mt-2">
                    <input type="checkbox" id="terms" class="mt-1 w-4 h-4 rounded border-zinc-700 bg-zinc-900 accent-yellow-400 cursor-pointer shadow-[0_0_15px_rgba(234,179,8,0.1)]">
                    <label for="terms" class="text-xs text-zinc-500 cursor-pointer select-none leading-relaxed">
                        By creating an account, I agree to the <a href="#" class="text-zinc-300 font-bold hover:text-yellow-400">Terms of Service</a> and <a href="#" class="text-zinc-300 font-bold hover:text-yellow-400">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" 
                    class="w-full bg-emerald-500 hover:bg-emerald-400 transition-all text-zinc-950 font-black py-4 rounded-2xl flex items-center justify-center gap-2 text-sm shadow-xl shadow-emerald-500/10 active:scale-[0.98] mt-6 uppercase tracking-widest">
                    <span>Create My Account</span>
                    <i class="fa-solid fa-crown"></i>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-zinc-800 text-center">
                <p class="text-zinc-500 text-sm">
                    Already a member? 
                    <a href="{% url 'login' %}" class="text-yellow-400 font-bold hover:underline underline-offset-4 ml-1">Sign in here</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
