{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Forge • GymForge</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 h-full flex items-center justify-center p-6 relative overflow-hidden" data-theme="dark">
    <!-- Background Decor -->
    <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-400/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-yellow-400/5 rounded-full blur-[120px]"></div>

    <div class="w-full max-w-xl relative z-10">
        <!-- Brand -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-14 h-14 bg-yellow-400 rounded-2xl flex items-center justify-center text-zinc-950 font-bold text-3xl logo-font mb-4 shadow-xl shadow-yellow-400/20">G</div>
            <h1 class="text-2xl font-bold tracking-tighter logo-font text-zinc-100">GymForge Membership</h1>
        </div>

        <!-- Register Card -->
        <div class="card bg-zinc-900/80 backdrop-blur-xl border border-zinc-700/50 rounded-[2rem] p-10 shadow-2xl">
            <h2 class="text-2xl font-bold mb-8 text-zinc-100 italic">Start your journey</h2>
            
            <form action="{% url 'login' %}" class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div class="form-control w-full">
                        <label class="label">
                            <span class="label-text text-xs font-bold uppercase tracking-widest text-zinc-500 px-1">Full Name</span>
                        </label>
                        <input type="text" placeholder="Juan Dela Cruz" 
                            class="input input-bordered w-full bg-zinc-900/50 border-zinc-700 focus:border-yellow-400 rounded-2xl py-4 px-6 text-sm outline-none transition-all h-14">
                    </div>
                    <div class="form-control w-full">
                        <label class="label">
                            <span class="label-text text-xs font-bold uppercase tracking-widest text-zinc-500 px-1">Email Address</span>
                        </label>
                        <input type="email" placeholder="juan@example.com" 
                            class="input input-bordered w-full bg-zinc-900/50 border-zinc-700 focus:border-yellow-400 rounded-2xl py-4 px-6 text-sm outline-none transition-all h-14">
                    </div>
                </div>

                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text text-xs font-bold uppercase tracking-widest text-zinc-500 px-1">Select Plan</span>
                    </label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="card bg-zinc-900/50 border border-zinc-700 p-4 rounded-2xl cursor-pointer hover:bg-zinc-800 transition-all text-center">
                            <input type="radio" name="plan" class="radio radio-warning hidden" checked>
                            <span class="block text-[10px] font-black uppercase text-zinc-500 mb-1">Monthly</span>
                            <span class="block text-lg font-bold">₱1,499</span>
                        </label>
                        <label class="card bg-zinc-900/50 border border-zinc-700 p-4 rounded-2xl cursor-pointer hover:bg-zinc-800 transition-all text-center">
                            <input type="radio" name="plan" class="radio radio-success hidden">
                            <span class="block text-[10px] font-black uppercase text-zinc-500 mb-1">Quarterly</span>
                            <span class="block text-lg font-bold">₱3,999</span>
                        </label>
                        <label class="card bg-zinc-900/50 border border-zinc-700 p-4 rounded-2xl cursor-pointer hover:bg-zinc-800 transition-all text-center">
                            <input type="radio" name="plan" class="radio radio-warning hidden">
                            <span class="block text-[10px] font-black uppercase text-zinc-500 mb-1">Annual</span>
                            <span class="block text-lg font-bold">₱12,999</span>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="form-control w-full">
                        <label class="label">
                            <span class="label-text text-xs font-bold uppercase tracking-widest text-zinc-500 px-1">Password</span>
                        </label>
                        <input type="password" placeholder="••••••••" 
                            class="input input-bordered w-full bg-zinc-900/50 border-zinc-700 focus:border-yellow-400 rounded-2xl py-4 px-6 text-sm outline-none transition-all h-14">
                    </div>
                    <div class="form-control w-full">
                        <label class="label">
                            <span class="label-text text-xs font-bold uppercase tracking-widest text-zinc-500 px-1">Confirm</span>
                        </label>
                        <input type="password" placeholder="••••••••" 
                            class="input input-bordered w-full bg-zinc-900/50 border-zinc-700 focus:border-yellow-400 rounded-2xl py-4 px-6 text-sm outline-none transition-all h-14">
                    </div>
                </div>

                <div class="form-control">
                    <label class="label cursor-pointer justify-start gap-3 px-1">
                        <input type="checkbox" class="checkbox checkbox-warning checkbox-sm rounded-md border-zinc-700 bg-zinc-900" id="terms">
                        <span class="label-text text-xs text-zinc-500 select-none leading-relaxed">
                            By creating an account, I agree to the <a href="#" class="text-zinc-300 font-bold hover:text-yellow-400">Terms of Service</a> and <a href="#" class="text-zinc-300 font-bold hover:text-yellow-400">Privacy Policy</a>.
                        </span>
                    </label>
                </div>

                <button type="submit" 
                    class="btn btn-success w-full text-zinc-950 font-black h-14 rounded-2xl flex items-center justify-center gap-2 text-sm shadow-xl shadow-emerald-500/10 active:scale-[0.98] mt-6 uppercase tracking-widest border-none">
                    <span>Create My Account</span>
                    <i class="fa-solid fa-crown"></i>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-zinc-800 text-center">
                <p class="text-zinc-500 text-sm">
                    Already a member? 
                    <a href="{% url 'login' %}" class="text-yellow-400 font-bold hover:underline underline-offset-4 ml-1">Sign in here</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
</html>
